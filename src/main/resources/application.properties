spring.application.name=vivek

spring.datasource.url=jdbc:mysql://localhost:3306/otp
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.error.include-stacktrace=never

# Twilio
twilio.account.sid=YOUR_ACCOUNT_SID
twilio.auth.token=YOUR_AUTH_TOKEN
twilio.phone.number=YOUR_TWILIO_NUMBER

# SMS Gateway
sms.gateway.url=https://europe-west1-sms-gateway-api-simpapp.cloudfunctions.net/api_sms_send
sms.gateway.api.key=YOUR_SMS_GATEWAY_API_KEY